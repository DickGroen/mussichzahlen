name = "mussichzahlen"
main = "worker/index.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

[vars]
ENV = "production"
ADMIN_EMAIL = "support@mussichzahlen.de"
STRIPE_LINK_MAHNUNG = "https://buy.stripe.com/test_eVq28sb5ycr59dYdS414404"

# Secrets worden ingesteld via Cloudflare Dashboard:
# ANTHROPIC_API_KEY, STRIPE_SECRET_KEY, STRIPE_WEBHOOK_SECRET, RESEND_API_KEY

[[kv_namespaces]]
binding = "SESSIONS_KV"
id = "394807db041c4b83907c9f6818a4184b"

[[kv_namespaces]]
binding = "JOBS_KV"
id = "1025d11aaba64a869ae40d2a7143ab40"

[[r2_buckets]]
binding = "DOCS_BUCKET"
bucket_name = "mussichzahlen-docs"

[triggers]
crons = ["*/5 * * * *"]

routes = [
  { pattern = "mussichzahlen.de/api/*", zone_name = "mussichzahlen.de" }
]
