name = "mussichzahlen"
main = "worker/index.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]
routes = [
  { pattern = "mussichzahlen.de/api/*", zone_name = "mussichzahlen.de" }
]
[vars]
ENV = "production"
API_DEBUG_MODE = "false"
ADMIN_EMAIL = "groenvantexel@gmail.com"
SITE_URL = "https://mussichzahlen.de"
# Stripe Payment Links (publiek — geen secrets)
STRIPE_LINK_MAHNUNG     = "https://buy.stripe.com/7sYdRab5yezd89U15i14407"
STRIPE_LINK_PARKSTRAFE  = "https://buy.stripe.com/3cI14o5LeaiX3TEeW814408"
STRIPE_LINK_RECHNUNG    = "https://buy.stripe.com/aFa6oI4Ha1Mr2PA7tG14409"
STRIPE_LINK_VERTRAG     = "https://buy.stripe.com/eVq4gA1uY3Uzai29BO1440a"
STRIPE_LINK_ANGEBOT     = "https://buy.stripe.com/00w7sMddGgHlbm6aFS1440b"
STRIPE_LINK_NEBENKOSTEN = "https://buy.stripe.com/bJe28sflO76Ldue6pC1440c"
