name = "mussichzahlen"
main = "worker/index.js"
compatibility_date = "2025-01-01"
compatibility_flags = ["nodejs_compat"]

routes = [
  { pattern = "mussichzahlen.de/api/*", zone_name = "mussichzahlen.de" }
]

[vars]
ENV = "production"
ADMIN_EMAIL = "groenvantexel@gmail.com"

# Stripe Payment Links (publiek — geen secrets)
STRIPE_LINK_MAHNUNG    = "https://buy.stripe.com/REPLACE_WITH_MAHNUNG_LINK"
STRIPE_LINK_PARKSTRAFE = "https://buy.stripe.com/REPLACE_WITH_PARKSTRAFE_LINK"
STRIPE_LINK_RECHNUNG   = "https://buy.stripe.com/REPLACE_WITH_RECHNUNG_LINK"
STRIPE_LINK_VERTRAG    = "https://buy.stripe.com/REPLACE_WITH_VERTRAG_LINK"
STRIPE_LINK_ANGEBOT    = "https://buy.stripe.com/REPLACE_WITH_ANGEBOT_LINK"

# Secrets worden ingesteld via Cloudflare Dashboard:
# ANTHROPIC_API_KEY
# STRIPE_SECRET_KEY
# STRIPE_WEBHOOK_SECRET
# RESEND_API_KEY

[[kv_namespaces]]
binding = "SESSIONS_KV"
id = "394807db041c4b83907c9f6818a4184b"

[[r2_buckets]]
binding = "DOCS_BUCKET"
bucket_name = "mussichzahlen-docs"

[triggers]
crons = ["*/5 * * * *"]
