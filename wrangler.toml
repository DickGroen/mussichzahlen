# ANTHROPIC_API_KEY
# STRIPE_SECRET_KEY
# STRIPE_WEBHOOK_SECRET
# RESEND_API_KEY
# Test route (nooit publiek linken)
TEST_SECRET = "miz-test-2026-xq7k"
TEST_EMAIL  = "groenvantexel@gmail.com"
[[kv_namespaces]]
binding = "SESSIONS_KV"
id = "394807db041c4b83907c9f6818a4184b"
[[r2_buckets]]
binding = "DOCS_BUCKET"
bucket_name = "mussichzahlen-docs"
[triggers]
crons = ["0 * * * *"]
