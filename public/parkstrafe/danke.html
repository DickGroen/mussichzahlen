```html
<script type="module">
  import {
    submitAutoPaid,
    submitPaid,
    validateFile,
    formatFileSize,
    track
  } from "/app.js";

  const params = new URLSearchParams(window.location.search);

  const sessionId = params.get("session_id");
  const type = params.get("type") || "parkstrafe";

  const autoCard = document.getElementById("auto-card");
  const autoStatus = document.getElementById("auto-status");
  const fallback = document.getElementById("thankyou-app");
  const locked = document.getElementById("locked-screen");
  const success = document.getElementById("success-screen");

  const nameEl = document.getElementById("customer-name");
  const emailEl = document.getElementById("customer-email");
  const uploadPanel = document.getElementById("upload-panel");
  const fileInput = document.getElementById("real-file-input");
  const selectedFile = document.getElementById("selected-file");
  const selectedFileName = document.getElementById("selected-file-name");
  const selectedFileMeta = document.getElementById("selected-file-meta");
  const removeFile = document.getElementById("remove-file");
  const submitBtn = document.getElementById("submit-btn");
  const statusBox = document.getElementById("status-box");

  let chosenFile = null;

  track("paid_thankyou_view", {
    type,
    has_session: Boolean(sessionId)
  });

  function showOnly(el) {
    [autoCard, fallback, locked, success].forEach(node => {
      if (node) node.classList.add("hidden");
    });

    if (el) el.classList.remove("hidden");
  }

  function setStatus(kind, message) {
    statusBox.className = `status-box ${kind || ""}`;
    statusBox.textContent = message;
    statusBox.classList.remove("hidden");
  }

  function updateSubmitState() {
    const hasFile = Boolean(chosenFile);
    const hasName = Boolean(nameEl.value.trim());
    const hasEmail = Boolean(emailEl.value.trim());

    submitBtn.disabled = !(hasFile && hasName && hasEmail);
    submitBtn.textContent = hasFile
      ? "Analyse starten"
      : "Zuerst eine Datei auswählen";
  }

  function setFile(file) {
    const error = validateFile(file);

    if (error) {
      chosenFile = null;
      selectedFile.classList.remove("show");
      setStatus("error", error);
      updateSubmitState();
      return;
    }

    chosenFile = file;
    selectedFileName.textContent = file.name;
    selectedFileMeta.textContent = formatFileSize(file.size);
    selectedFile.classList.add("show");
    statusBox.classList.add("hidden");

    updateSubmitState();
  }

  uploadPanel.addEventListener("click", () => fileInput.click());

  fileInput.addEventListener("change", () => {
    const file = fileInput.files && fileInput.files[0];
    if (file) setFile(file);
  });

  ["dragenter", "dragover"].forEach(eventName => {
    uploadPanel.addEventListener(eventName, e => {
      e.preventDefault();
      uploadPanel.classList.add("drag-over");
    });
  });

  ["dragleave", "drop"].forEach(eventName => {
    uploadPanel.addEventListener(eventName, e => {
      e.preventDefault();
      uploadPanel.classList.remove("drag-over");
    });
  });

  uploadPanel.addEventListener("drop", e => {
    const file = e.dataTransfer.files && e.dataTransfer.files[0];
    if (file) setFile(file);
  });

  removeFile.addEventListener("click", e => {
    e.preventDefault();

    chosenFile = null;
    fileInput.value = "";
    selectedFile.classList.remove("show");

    updateSubmitState();
  });

  nameEl.addEventListener("input", updateSubmitState);
  emailEl.addEventListener("input", updateSubmitState);

  submitBtn.addEventListener("click", async () => {
    try {
      submitBtn.disabled = true;
      submitBtn.textContent = "Upload läuft…";

      await submitPaid({
        file: chosenFile,
        name: nameEl.value.trim(),
        email: emailEl.value.trim(),
        type,
        sessionId,
        onStatus: setStatus
      });

      track("paid_fallback_upload_completed", { type });

      showOnly(success);

    } catch (err) {
      track("paid_fallback_upload_failed", {
        type,
        error: err.message
      });

      setStatus(
        "error",
        err.message || "Upload fehlgeschlagen. Bitte erneut versuchen."
      );

      submitBtn.disabled = false;
      submitBtn.textContent = "Analyse starten";
    }
  });

  if (!sessionId || !sessionId.startsWith("cs_")) {
    showOnly(locked);

  } else {
    try {
      autoStatus.textContent = "Zahlung wird geprüft…";

      await submitAutoPaid({
        type,
        sessionId,
        onStatus: (_, msg) => {
          autoStatus.textContent = msg;
        }
      });

      track("auto_paid_analysis_started", { type });

      showOnly(success);

    } catch (err) {

      if (err.needUpload) {

        track("auto_paid_fallback_upload_needed", {
          type,
          reason: err.message
        });

        if (emailEl && params.get("email")) {
          emailEl.value = params.get("email");
        }

        if (nameEl && params.get("name")) {
          nameEl.value = params.get("name");
        }

        showOnly(fallback);

        updateSubmitState();

      } else {

        autoStatus.className = "status-box error";

        autoStatus.textContent =
          err.message ||
          "Automatische Analyse fehlgeschlagen. Bitte kontaktiere support@mussichzahlen.de";
      }
    }
  }
</script>
